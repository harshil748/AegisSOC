id: SIGMA-AEGIS-0015
title: Known Credential Dumping Tool Indicators (EDR-tagged)
description: >
  Detects EDR telemetry that has already been technique-tagged as credential
  access / OS credential dumping (e.g. Mimikatz-family tools, LSASS memory
  access helpers).
status: stable
level: critical
logsource:
  product: edr
  category: process_creation
detection:
  selection:
    mitre_techniques|contains: "T1003.001"
  condition: selection
technique_ids: [T1003.001, T1003]
falsepositives: []
