id: SIGMA-AEGIS-0017
title: Kubernetes Secret Access in Sensitive Namespace
description: >
  Detects get/list/watch access to Kubernetes Secret objects, which may
  indicate credential harvesting from a compromised workload identity or an
  over-permissioned service account.
status: experimental
level: medium
logsource:
  product: kubernetes
  category: audit
detection:
  selection:
    k8s_resource: "secrets"
    k8s_verb:
      - "get"
      - "list"
      - "watch"
  condition: selection
technique_ids: [T1609, T1552.007]
falsepositives:
  - Automated secret-rotation controllers and legitimate operator
    reconciliation loops running under a scoped service account.
