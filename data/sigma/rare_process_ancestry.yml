id: SIGMA-AEGIS-0014
title: Rare or Unexpected Parent-Child Process Ancestry
description: >
  Detects shells or script hosts spawned from parents that do not normally
  launch interactive interpreters (WMI provider host, Task Scheduler engine,
  the Services Control Manager), suppressing hits where the child is a
  known-signed binary.
status: experimental
level: medium
logsource:
  product: sysmon
  category: process_creation
detection:
  selection:
    parent_image|endswith:
      - "wmiprvse.exe"
      - "taskeng.exe"
      - "services.exe"
    image|endswith:
      - "powershell.exe"
      - "cmd.exe"
      - "rundll32.exe"
      - "wscript.exe"
  filter_signed:
    signed: true
  condition: selection and not filter_signed
technique_ids: [T1059, T1055]
falsepositives:
  - Signed configuration-management agents (SCCM, RMM tooling) that
    legitimately launch shells from a service or task-engine parent.
