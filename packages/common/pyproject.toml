[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aegis-common"
version = "1.0.0"
description = "Shared schemas, models, and utilities for AegisSOC"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "orjson>=3.9",
  "python-dateutil>=2.9",
  "sqlalchemy[asyncio]>=2.0",
  "aiosqlite>=0.20",
  "asyncpg>=0.29",
  "aiokafka>=0.10",
  "pyjwt>=2.8",
  "bcrypt>=4.0",
  "prometheus-client>=0.20",
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.setuptools.packages.find]
where = ["."]
include = ["aegis_common*"]
