{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: aegis-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DSN: {{ .Values.secrets.postgresDsn | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
  NEO4J_AUTH: {{ .Values.secrets.neo4jAuth | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
{{- else }}
# secrets.create=false: bring your own `aegis-secrets` Secret in
# {{ .Values.namespace }} (Vault / External Secrets Operator / sealed-secrets)
# with keys POSTGRES_PASSWORD, POSTGRES_DSN, NEO4J_PASSWORD, NEO4J_AUTH,
# JWT_SECRET, OPENAI_API_KEY, GRAFANA_ADMIN_PASSWORD.
{{- end }}
