{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: aegis-frontend
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels: { app: aegis-frontend }
  template:
    metadata:
      labels: { app: aegis-frontend }
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.registry }}/frontend:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GATEWAY_UPSTREAM
              value: "http://aegis-frontend-gateway:8080"
          ports:
            - containerPort: {{ .Values.frontend.containerPort }}
          readinessProbe:
            httpGet: { path: /, port: {{ .Values.frontend.containerPort }} }
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-frontend
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: aegis-frontend }
  ports:
    - port: {{ .Values.frontend.servicePort }}
      targetPort: {{ .Values.frontend.containerPort }}
{{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aegis-frontend-gateway
                port: { number: 8080 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-frontend
                port: { number: {{ .Values.frontend.servicePort }} }
{{- end }}
