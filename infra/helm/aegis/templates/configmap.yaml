apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
data:
  AEGIS_SYNC_MODE: {{ .Values.global.syncMode | quote }}
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  TENANT_ID: {{ .Values.global.tenantId | quote }}
  LOG_LEVEL: {{ .Values.global.logLevel | quote }}
  LLM_ENABLED: {{ .Values.global.llmEnabled | quote }}
  LLM_MODEL: {{ .Values.global.llmModel | quote }}
  LLM_MAX_EVIDENCE_ITEMS: {{ .Values.global.llmMaxEvidenceItems | quote }}
  CORS_ORIGINS: {{ .Values.global.corsOrigins | quote }}
  KAFKA_BOOTSTRAP: "aegis-kafka:9092"
  REDIS_URL: "redis://aegis-redis:6379/0"
  NEO4J_URI: "bolt://aegis-neo4j:7687"
  NEO4J_USER: "neo4j"
  OPENSEARCH_URL: "http://aegis-opensearch:9200"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://aegis-otel-collector:4318"
  CASE_MANAGEMENT_URL: "http://aegis-case-management:8006"
  DETECTION_URL: "http://aegis-detection:8005"
  GRAPH_BUILDER_URL: "http://aegis-graph-builder:8004"
  LLM_TRIAGE_URL: "http://aegis-llm-triage:8007"
  RESPONSE_POLICY_URL: "http://aegis-response-policy:8008"
  APPROVAL_URL: "http://aegis-approval:8009"
  AUDIT_URL: "http://aegis-audit:8010"
  INGESTION_URL: "http://aegis-ingestion:8001"
