{{- range $name, $svc := .Values.services }}
{{- $resName := include "aegis.svcName" $name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $resName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $resName }}
    {{- include "aegis.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $resName }}
  template:
    metadata:
      labels:
        app: {{ $resName }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: {{ $name | replace "_" "-" }}
          image: "{{ $.Values.image.registry }}/{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          envFrom:
            - configMapRef: { name: aegis-config }
            - secretRef: { name: aegis-secrets }
          env:
            - name: SERVICE_PORT
              value: {{ $svc.port | quote }}
          readinessProbe:
            httpGet: { path: /ready, port: {{ $svc.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: {{ $svc.port }} }
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $resName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $resName }}
spec:
  selector:
    app: {{ $resName }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
  type: ClusterIP
---
{{- end }}
