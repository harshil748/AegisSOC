apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-detection
  namespace: aegissoc
  labels:
    app: aegis-detection
    app.kubernetes.io/part-of: aegissoc
    app.kubernetes.io/component: detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-detection
  template:
    metadata:
      labels:
        app: aegis-detection
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: detection
          image: ghcr.io/aegissoc/detection:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
              name: http
          envFrom:
            - configMapRef:
                name: aegis-config
            - secretRef:
                name: aegis-secrets
          env:
            - name: SERVICE_PORT
              value: "8005"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      # TODO: add topologySpreadConstraints / podAntiAffinity across zones at scale.
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-detection
  namespace: aegissoc
  labels:
    app: aegis-detection
spec:
  selector:
    app: aegis-detection
  ports:
    - name: http
      port: 8005
      targetPort: 8005
  type: ClusterIP
