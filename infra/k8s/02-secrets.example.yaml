# EXAMPLE ONLY — do not apply as-is to a real cluster.
# Copy to 02-secrets.yaml (gitignored), fill in real values or generate via
# `kubectl create secret generic aegis-secrets --from-env-file=.env -n aegissoc`,
# and prefer an external secret manager (Vault, AWS/GCP Secrets Manager via
# External Secrets Operator) in production instead of static Secret objects.
apiVersion: v1
kind: Secret
metadata:
  name: aegis-secrets
  namespace: aegissoc
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DSN: "postgresql+asyncpg://aegis:CHANGE_ME@aegis-postgres:5432/aegis"
  NEO4J_PASSWORD: "CHANGE_ME"
  NEO4J_AUTH: "neo4j/CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"
  OPENAI_API_KEY: "CHANGE_ME"
  GRAFANA_ADMIN_PASSWORD: "CHANGE_ME"
