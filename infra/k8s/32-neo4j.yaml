# Single-instance Neo4j Community for dev/staging. Production: Neo4j
# Enterprise Causal Cluster (or AuraDB managed) with read replicas fronted
# by the graph_builder write path and detection's read-heavy traversal
# queries split across cores/replicas — see docs/SCALABILITY.md.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aegis-neo4j-data
  namespace: aegissoc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-neo4j
  namespace: aegissoc
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: aegis-neo4j }
  template:
    metadata:
      labels: { app: aegis-neo4j }
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.23-community
          ports:
            - { containerPort: 7474, name: http }
            - { containerPort: 7687, name: bolt }
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef: { name: aegis-secrets, key: NEO4J_AUTH }
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /, port: 7474 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "2Gi" }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: aegis-neo4j-data }
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-neo4j
  namespace: aegissoc
spec:
  selector: { app: aegis-neo4j }
  ports:
    - { name: http, port: 7474, targetPort: 7474 }
    - { name: bolt, port: 7687, targetPort: 7687 }
