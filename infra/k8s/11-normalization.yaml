apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-normalization
  namespace: aegissoc
  labels:
    app: aegis-normalization
    app.kubernetes.io/part-of: aegissoc
    app.kubernetes.io/component: normalization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-normalization
  template:
    metadata:
      labels:
        app: aegis-normalization
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: normalization
          image: ghcr.io/aegissoc/normalization:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: aegis-config
            - secretRef:
                name: aegis-secrets
          env:
            - name: SERVICE_PORT
              value: "8002"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      # TODO: add topologySpreadConstraints / podAntiAffinity across zones at scale.
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-normalization
  namespace: aegissoc
  labels:
    app: aegis-normalization
spec:
  selector:
    app: aegis-normalization
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  type: ClusterIP
