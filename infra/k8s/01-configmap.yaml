# Shared, non-secret configuration consumed by every AegisSOC backend
# service via `envFrom: configMapRef`. Secrets (DB passwords, JWT secret,
# OpenAI API key) live in a separate Secret (see 02-secrets.example.yaml)
# and must be provisioned via your secret manager / sealed-secrets / Vault
# CSI driver in real clusters — never commit real values here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: aegissoc
data:
  AEGIS_SYNC_MODE: "async"
  ENVIRONMENT: "production"
  TENANT_ID: "default"
  LOG_LEVEL: "INFO"
  KAFKA_BOOTSTRAP: "aegis-kafka:9092"
  REDIS_URL: "redis://aegis-redis:6379/0"
  # POSTGRES_DSN (contains the DB password) is intentionally NOT here — it
  # is provisioned via the aegis-secrets Secret so it never appears in a
  # ConfigMap or in `kubectl describe`. See 02-secrets.example.yaml.
  NEO4J_URI: "bolt://aegis-neo4j:7687"
  NEO4J_USER: "neo4j"
  OPENSEARCH_URL: "http://aegis-opensearch:9200"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://aegis-otel-collector:4318"
  LLM_ENABLED: "true"
  LLM_MODEL: "gpt-4o-mini"
  LLM_MAX_EVIDENCE_ITEMS: "40"
  CORS_ORIGINS: "https://aegissoc.example.com"
  CASE_MANAGEMENT_URL: "http://aegis-case-management:8006"
  DETECTION_URL: "http://aegis-detection:8005"
  GRAPH_BUILDER_URL: "http://aegis-graph-builder:8004"
  LLM_TRIAGE_URL: "http://aegis-llm-triage:8007"
  RESPONSE_POLICY_URL: "http://aegis-response-policy:8008"
  APPROVAL_URL: "http://aegis-approval:8009"
  AUDIT_URL: "http://aegis-audit:8010"
  INGESTION_URL: "http://aegis-ingestion:8001"
