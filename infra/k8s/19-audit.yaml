apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-audit
  namespace: aegissoc
  labels:
    app: aegis-audit
    app.kubernetes.io/part-of: aegissoc
    app.kubernetes.io/component: audit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-audit
  template:
    metadata:
      labels:
        app: aegis-audit
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8010"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: audit
          image: ghcr.io/aegissoc/audit:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8010
              name: http
          envFrom:
            - configMapRef:
                name: aegis-config
            - secretRef:
                name: aegis-secrets
          env:
            - name: SERVICE_PORT
              value: "8010"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      # TODO: add topologySpreadConstraints / podAntiAffinity across zones at scale.
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-audit
  namespace: aegissoc
  labels:
    app: aegis-audit
spec:
  selector:
    app: aegis-audit
  ports:
    - name: http
      port: 8010
      targetPort: 8010
  type: ClusterIP
