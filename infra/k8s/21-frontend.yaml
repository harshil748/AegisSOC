apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-frontend
  namespace: aegissoc
  labels:
    app: aegis-frontend
    app.kubernetes.io/part-of: aegissoc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-frontend
  template:
    metadata:
      labels:
        app: aegis-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/aegissoc/frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            # Resolved by nginx's envsubst templating at container start
            # (see frontend/nginx.conf); points at the in-cluster Service.
            - name: GATEWAY_UPSTREAM
              value: http://aegis-frontend-gateway:8080
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-frontend
  namespace: aegissoc
spec:
  selector:
    app: aegis-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-ingress
  namespace: aegissoc
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["aegissoc.example.com"]
      secretName: aegissoc-tls
  rules:
    - host: aegissoc.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aegis-frontend-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-frontend
                port:
                  number: 3000
