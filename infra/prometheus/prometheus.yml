# Prometheus scrape configuration for AegisSOC local/dev stack.
# In Kubernetes, scraping is instead driven by the ServiceMonitor-equivalent
# annotations/labels applied in infra/k8s/*-deployment.yaml (prometheus.io/scrape).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: aegissoc-local

rule_files: []

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # add alertmanager:9093 when deployed

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # --- Backend services (each exposes /metrics via prometheus-client) ---
  - job_name: aegis-ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestion:8001"]
        labels: {service: ingestion, tier: data-path}

  - job_name: aegis-normalization
    metrics_path: /metrics
    static_configs:
      - targets: ["normalization:8002"]
        labels: {service: normalization, tier: data-path}

  - job_name: aegis-enrichment
    metrics_path: /metrics
    static_configs:
      - targets: ["enrichment:8003"]
        labels: {service: enrichment, tier: data-path}

  - job_name: aegis-graph-builder
    metrics_path: /metrics
    static_configs:
      - targets: ["graph_builder:8004"]
        labels: {service: graph_builder, tier: data-path}

  - job_name: aegis-detection
    metrics_path: /metrics
    static_configs:
      - targets: ["detection:8005"]
        labels: {service: detection, tier: data-path}

  - job_name: aegis-case-management
    metrics_path: /metrics
    static_configs:
      - targets: ["case_management:8006"]
        labels: {service: case_management, tier: control-plane}

  - job_name: aegis-llm-triage
    metrics_path: /metrics
    static_configs:
      - targets: ["llm_triage:8007"]
        labels: {service: llm_triage, tier: reasoning}

  - job_name: aegis-response-policy
    metrics_path: /metrics
    static_configs:
      - targets: ["response_policy:8008"]
        labels: {service: response_policy, tier: response}

  - job_name: aegis-approval
    metrics_path: /metrics
    static_configs:
      - targets: ["approval:8009"]
        labels: {service: approval, tier: control-plane}

  - job_name: aegis-audit
    metrics_path: /metrics
    static_configs:
      - targets: ["audit:8010"]
        labels: {service: audit, tier: control-plane}

  - job_name: aegis-frontend-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["frontend_gateway:8080"]
        labels: {service: frontend_gateway, tier: control-plane}

  # --- Infra exporters ---
  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]
        labels: {service: redpanda, tier: streaming}

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889", "otel-collector:8888"]
        labels: {service: otel-collector, tier: observability}

  # Neo4j, Postgres, Redis, OpenSearch metrics require sidecar exporters
  # (neo4j has a built-in /metrics on 2004 when enabled; postgres_exporter,
  # redis_exporter, and the opensearch prometheus plugin are recommended
  # additions for production — see docs/SCALABILITY.md).
  - job_name: neo4j
    static_configs:
      - targets: ["neo4j:2004"]
        labels: {service: neo4j, tier: storage}

  - job_name: opensearch
    metrics_path: /_prometheus/metrics
    static_configs:
      - targets: ["opensearch:9200"]
        labels: {service: opensearch, tier: storage}
