server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy REST calls to the frontend-gateway service. ${GATEWAY_UPSTREAM} is
    # substituted by nginx's envsubst templating at container startup.
    location /api/ {
        proxy_pass ${GATEWAY_UPSTREAM}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass ${GATEWAY_UPSTREAM}/health;
    }

    # Static assets: long-lived cache since filenames are content-hashed by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for React Router client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
